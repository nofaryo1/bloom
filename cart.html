<!DOCTYPE html>
<html lang="he">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Bloom || הסל שלך</title>
  <link rel="stylesheet" href="style.css">
  <link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Assistant:wght@300;400;600;700&display=swap" rel="stylesheet">
  <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
  <script src="script.js" defer></script>
</head>
<body>

  <header>
    <nav class="navbar">
      <h1 class="logo">
        <img src="blooming.png" alt="Bloom by Nofar logo">
      </h1>
      <ul class="nav-links">
        <a href="index.html">דף הבית</a>
        <a href="flowers.html">הזרים שלנו</a>
        <a href="contact.html">צור קשר</a>
        <a href="cart.html" class="cart-link">
          <span class="material-icons">shopping_cart</span>
          <span class="cart-badge" id="cartBadge"></span>
        </a>
      </ul>
    </nav>
  </header>

  <main>
    <h2 class="cart-title">הפריטים שלך</h2>
    <div id="cart-items"></div>
    <p id="total-price"></p>

    <form id="orderForm" onsubmit="submitOrder(event)">
      <h3>פרטי ההזמנה:</h3>

      <label for="first-name">שם פרטי:</label>
      <input type="text" id="first-name" placeholder="שם" required>

      <label for="last-name">שם משפחה:</label>
      <input type="text" id="last-name" placeholder="שם משפחה" required>

      <label for="address">כתובת:</label>
      <input type="text" id="address" placeholder="רחוב, בית, דירה" required>

      <label for="email">אימייל:</label>
      <input type="email" id="email" placeholder="yourmail@example.com" required>

      <label for="delivery-date">למתי תרצו את ההזמנה?</label>
      <input type="date" id="delivery-date" required>

      <button type="submit" formaction="success.html">בצע הזמנה</button>
    </form>
  </main>

  <footer class="footer-signup">
    <h3>בואו נשאר בקשר 💌</h3>
    <p>הצטרפי לניוזלטר שלנו וקבלי עדכונים על קולקציות חדשות ומבצעים מיוחדים!</p>
    <form id="newsletterForm">
      <input type="email" id="emailInput" placeholder="כתובת אימייל" required>
      <button type="submit">הרשמה</button>
    </form>
    <p id="successMessage">המייל שלך נרשם בהצלחה! איזה כיף שהצטרפת למשפחת Bloom! 🌸</p>
    <p class="copyright">© 2026 Bloom || Flowers Studio</p>
  </footer>

</body>
</html>
